<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Profile Menu</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<script data-ui5-config type="application/json">
		{
			"rtl": false
		}

	</script>

	<script src="%VITE_BUNDLE_PATH%" type="module"></script>
</head>

<body>
<ui5-button id="btnOpenProfileMenu">Profile menu</ui5-button>
<ui5-profile-menu id="profileMenu" user-setting="userSetting">
	<ui5-user-profile slot="users"
					 avatar="./img/man_avatar_1.png"
					text="Alain Chevalier"
					 subtitle1="alian.chevalier@sap.com"
					 subtitle2="Delivery Manager, SAP SE"
					 selected>
	</ui5-user-profile>
	<ui5-user-profile slot="users"
					 avatar="./img/man_avatar_1.png"
					 text="Alain Chevalier"
					 subtitle1="test.alian.chevalier@sap.com">
	</ui5-user-profile>
	<ui5-user-profile slot="users"
					 avatar="./img/man_avatar_1.png"
					 text="Alain Chevalier"
					 subtitle1="alian.chevalier@ariba.com"
					 subtitle2="Account Manager">
	</ui5-user-profile>
	<ui5-profile-menu-item icon="action-settings" text="Setting"></ui5-profile-menu-item>
	<ui5-profile-menu-item icon="globe" text="Product-specific user action"></ui5-profile-menu-item>
	<ui5-profile-menu-item icon="globe" text="Product-specific user action"></ui5-profile-menu-item>
	<ui5-profile-menu-item icon="official-service" text="Legal Information">
		<ui5-profile-menu-item text="Private Policy"></ui5-profile-menu-item>
		<ui5-profile-menu-item text="Terms of Use"></ui5-profile-menu-item>
	</ui5-profile-menu-item>
</ui5-profile-menu>

<ui5-settings-dialog id="userSetting" header-title="Settings" show-search-field>
	<!-- Item -->
	<ui5-setting-item text="Setting 1" tooltip="tooltip" icon="settings" header-title="Header title | Setting 1">
		<ui5-setting-view text="Setting 1 Tab 1">
			<ui5-button>Setting 1 Content 1</ui5-button>
		</ui5-setting-view>
		<ui5-setting-view text="Setting 1 Tab 2">
			<ui5-button>Setting 1 Content 2</ui5-button>
		</ui5-setting-view>
	</ui5-setting-item>

	<!-- Item -->
	<ui5-setting-item fixed-item text="Setting 2" header-title="Header title | Setting 2">
		<ui5-setting-view text="Setting 2 Tab 1">
			<ui5-button>Setting 2 Content 1</ui5-button>
		</ui5-setting-view>
		<ui5-setting-view text="Setting 2 Tab 2">
			<ui5-button>Setting 2 Content 2</ui5-button>
		</ui5-setting-view>
		<ui5-setting-view  text="Setting 2 Tab 3">
			<ui5-button>Setting 2 Content 3</ui5-button>
		</ui5-setting-view>
	</ui5-setting-item>

	<!-- Item -->
	<ui5-setting-item text="Setting 3" tooltip="tooltip" icon="accessibility" header-title="Header title | Setting 3">
		<ui5-setting-view text="Setting 3 Tab 1">
			<ui5-button>Setting 3 Content 1</ui5-button>
		</ui5-setting-view>
	</ui5-setting-item>
</ui5-settings-dialog>

<script>
	document.getElementById("btnOpenProfileMenu").addEventListener("click", function () {
		document.getElementById("profileMenu").open = true;
	});
</script>
</body>
</html>
